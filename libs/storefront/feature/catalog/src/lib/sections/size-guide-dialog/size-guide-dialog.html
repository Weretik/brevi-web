<div class="flex flex-col gap-8 pb-2">
  @for (section of sections(); track section.title) {
    <section
      class="rounded-lg border border-surface-200 bg-surface-0 p-4 sm:p-5 dark:border-surface-700 dark:bg-surface-900/40"
    >
      <div class="flex flex-col gap-4">
        <h3 class="m-0 text-lg font-semibold text-surface-900 dark:text-surface-0">
          {{ section.title }}
        </h3>

        <img
          [ngSrc]="section.image"
          width="960"
          height="540"
          [alt]="section.title"
          class="w-full max-w-[960px] h-auto max-h-[70vh] self-center object-contain rounded-md border border-surface-200 dark:border-surface-700"
        />

        <div class="flex flex-col gap-3 text-sm leading-6 text-surface-700 dark:text-surface-200">
          @for (paragraph of section.paragraphs; track paragraph) {
            <p class="m-0">{{ paragraph }}</p>
          }
        </div>

        @if (section.rules?.length) {
          <ol
            class="m-0 list-decimal pl-5 text-sm leading-6 text-surface-700 dark:text-surface-200"
          >
            @for (rule of section.rules; track rule) {
              <li>{{ rule }}</li>
            }
          </ol>
        }
      </div>
    </section>
  }
</div>
